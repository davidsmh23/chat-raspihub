<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover es crucial para iPhones con Notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Asistente IA</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

  <!-- Fuente Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Librería Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>

  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-color: #f3f4f6;
      --chat-bg: #ffffff;
      --user-msg-bg: #2563eb;
      --user-msg-text: #ffffff;
      --bot-msg-bg: #f1f5f9;
      --bot-msg-text: #1e293b;
      --border-color: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      /* Prevenir resaltado azul al tocar en móviles */
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      /* Usamos dvh para móviles, vh como fallback */
      height: 100vh;
      height: 100dvh; 
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Contenedor principal */
    .chat-container {
      width: 100%;
      max-width: 800px;
      /* En escritorio, 90% de altura. En móvil se sobrescribe */
      height: 90vh;
      height: 90dvh;
      background-color: var(--chat-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Cabecera */
    header {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0; /* Evita que la cabecera se encoja */
      z-index: 10;
    }

    header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
    }

    /* Área de mensajes */
    #chat-box {
      flex: 1; /* Ocupa todo el espacio disponible */
      min-height: 0; /* CRUCIAL para que el scroll funcione dentro de Flexbox */
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: #ffffff;
      scroll-behavior: smooth;
      /* Ajuste para scroll en iOS */
      -webkit-overflow-scrolling: touch;
    }

    /* Estilos de mensajes */
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      position: relative;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user {
      align-self: flex-end;
      background-color: var(--user-msg-bg);
      color: var(--user-msg-text);
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background-color: var(--bot-msg-bg);
      color: var(--bot-msg-text);
      border-bottom-left-radius: 4px;
    }

    /* Markdown Styles */
    .bot pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 8px;
      font-family: 'Consolas', monospace;
      font-size: 0.85rem;
    }
    .bot code {
      background: rgba(0,0,0,0.1);
      padding: 2px 4px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
    }
    .bot pre code { background: transparent; padding: 0; color: inherit; }
    .bot ul, .bot ol { margin-left: 20px; margin-top: 8px; }
    .bot a { color: #2563eb; text-decoration: none; }
    .bot a:hover { text-decoration: underline; }

    /* Área de input */
    .input-area {
      padding: 16px;
      /* Soporte para iPhone Notch/Home Bar */
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      background: white;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0; /* Evita que el input se aplaste */
      z-index: 20;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid var(--border-color);
      font-size: 16px; /* 16px evita zoom automático en iOS al hacer focus */
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
      -webkit-appearance: none; /* Quitar estilos nativos iOS */
    }

    input[type="text"]:focus {
      border-color: var(--primary-color);
      background: white;
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-left: 2px;
    }

    /* Animación Typing */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background-color: var(--bot-msg-bg);
      padding: 12px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      margin-bottom: 8px;
      align-items: center;
      gap: 4px;
      width: fit-content;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Adaptación Móvil Específica */
    @media (max-width: 600px) {
      body {
        background-color: #fff; /* Fondo blanco en móvil para evitar bordes raros */
      }
      
      .chat-container {
        height: 100vh; /* Fallback */
        height: 100dvh; /* Altura dinámica real */
        max-width: 100%;
        border-radius: 0;
        box-shadow: none;
      }

      .message {
        max-width: 85%;
      }

      header {
        padding-top: calc(12px + env(safe-area-inset-top)); /* Espacio para notch arriba */
      }
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <header>
      <div class="status-dot"></div>
      <h3>Asistente Virtual</h3>
    </header>

    <div id="chat-box">
      <!-- Mensaje de bienvenida -->
      <div class="message bot">
        <p>Hola 👋 ¿En qué puedo ayudarte hoy?</p>
      </div>
    </div>

    <!-- Indicador de carga (se moverá con JS) -->
    <div class="typing-indicator" id="typing-indicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <form class="input-area" onsubmit="sendMessage(); return false;">
      <input type="text" id="user-input" placeholder="Escribe tu mensaje..." autocomplete="off">
      <button type="submit" aria-label="Enviar">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <script>
    const converter = new showdown.Converter({
      simpleLineBreaks: true,
      openLinksInNewWindow: true,
      emoji: true
    });

    const chatBox = document.getElementById("chat-box");
    const inputField = document.getElementById("user-input");
    const typingIndicator = document.getElementById("typing-indicator");

    // Prevenir zoom en doble tap en algunos móviles
    document.addEventListener('dblclick', function(event) {
        event.preventDefault();
    }, { passive: false });

    function scrollToBottom() {
      // Pequeño timeout para asegurar que el teclado virtual haya terminado de subir
      setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 50);
    }

    async function sendMessage() {
      const message = inputField.value.trim();
      if (!message) return;

      // 1. Añadir mensaje usuario
      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.textContent = message;
      chatBox.appendChild(userMsg);
      
      inputField.value = "";
      // Mantener foco en escritorio, pero evaluar en móvil si queremos teclado abierto
      // inputField.focus(); 
      scrollToBottom();

      // 2. Mostrar loading
      chatBox.appendChild(typingIndicator);
      typingIndicator.style.display = "flex";
      scrollToBottom();

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({message: message})
        });

        const data = await response.json();

        // 3. Quitar loading y mostrar respuesta
        typingIndicator.style.display = "none";
        if(typingIndicator.parentNode === chatBox) {
            chatBox.removeChild(typingIndicator);
        }

        const botHTML = converter.makeHtml(data.response);
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerHTML = botHTML;
        chatBox.appendChild(botMsg);

      } catch (error) {
        console.error("Error:", error);
        typingIndicator.style.display = "none";
        if(typingIndicator.parentNode === chatBox) {
            chatBox.removeChild(typingIndicator);
        }
        
        const errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.style.color = "#ef4444";
        errorMsg.textContent = "Error de conexión.";
        chatBox.appendChild(errorMsg);
      }

      scrollToBottom();
    }
  </script>
</body>
</html>
