services:
  chat-raspihub:
    build:
      context: .
      dockerfile: dockerfile
    container_name: chat-raspihub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3752}:3752"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3752/api/health', timeout=5).read()"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
